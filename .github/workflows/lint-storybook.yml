name: Lint Storybook

on:
  push:
    branches:
      - dev
      - main
    paths:
      - '**/*.stories.@(js|ts)'
      - '**/.storybook/**'
  pull_request:
    branches:
      - dev
      - main

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  storybook-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        package:
          - npm
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-bun-deps

      - uses: ./.github/actions/setup-playwright-chromium

      - name: Storybook vitest project (${{ matrix.package }})
        working-directory: ${{ matrix.package }}
        run: bunx vitest run --project=storybook
